name: Publish Homebrew Tap

on:
  workflow_call:
    inputs:
      release_version:
        description: Release version without leading v
        required: true
        type: string
    secrets:
      HOMEBREW_TAP_TOKEN:
        required: true

env:
  HOMEBREW_FORMULA: lingyang-kong/node-via-bun/node
  PROJECT_HOMEBREW_TAP: lingyang-kong/node-via-bun

jobs:
  publish_homebrew_tap:
    name: Publish Homebrew Tap
    runs-on: macos-latest

    steps:
      - name: Unlink conflicting Node formulas
        run: |
          brew list --formula --versions | while read -r conflict _; do
          	case "$conflict" in
          	node | node@*)
          		brew unlink "$conflict"
          		;;
          	esac
          done
        background: true

      - name: Set up Bun Homebrew tap
        env:
          BUN_HOMEBREW_TAP: oven-sh/bun
        run: |
          brew tap "$BUN_HOMEBREW_TAP"
          brew trust --formula "$BUN_HOMEBREW_TAP/bun"
        background: true

      - name: Set up project Homebrew tap
        run: |
          brew tap "$PROJECT_HOMEBREW_TAP"
          printf 'PROJECT_TAP_DIR=%s\n' \
          	"$(brew --repo "$PROJECT_HOMEBREW_TAP")" >>"$GITHUB_ENV"

      - name: Bump formula
        working-directory: ${{ env.PROJECT_TAP_DIR }}
        env:
          RELEASE_VERSION: ${{ inputs.release_version }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

          brew bump-formula-pr \
          	--write-only \
          	--commit \
          	--url "https://github.com/$PROJECT_HOMEBREW_TAP/archive/refs/tags/v$RELEASE_VERSION.tar.gz" \
          	--version "$RELEASE_VERSION" \
          	--message "node: update to $RELEASE_VERSION" \
          	"$HOMEBREW_FORMULA"

      - name: Validate formula syntax
        working-directory: ${{ env.PROJECT_TAP_DIR }}
        run: ruby -c Formula/node.rb

      - wait-all:

      - name: Test formula
        run: |
          brew install "$HOMEBREW_FORMULA"
          brew test "$HOMEBREW_FORMULA"

      - name: Push formula update
        working-directory: ${{ env.PROJECT_TAP_DIR }}
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git config credential.helper store
          git credential approve <<-GIT_CREDENTIAL
          	protocol=https
          	host=github.com
          	username=x-access-token
          	password=$HOMEBREW_TAP_TOKEN
          GIT_CREDENTIAL

          git push origin HEAD:main
