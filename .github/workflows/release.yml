name: Release

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: Release version without leading v
        required: true

permissions:
  contents: read

env:
  RELEASE_TAG: v${{ inputs.release_version }}
  RELEASE_VERSION: ${{ inputs.release_version }}

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  validate_release:
    name: Validate Release
    runs-on: ubuntu-slim

    steps:
      - name: Check release version format
        run: |
          case "$RELEASE_VERSION" in
          v*)
          	printf '%s\n' 'RELEASE_VERSION must not include the leading v' >&2
          	exit 1
          	;;
          esac
        background: true

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - parallel:
          - name: Check release branch
            run: |
              if [ "$GITHUB_REF_NAME" != main ]; then
              	echo "release workflow must be run from main, got $GITHUB_REF_NAME" >&2
              	exit 1
              fi

          - name: Check release tag
            run: |
              if git rev-parse --quiet --verify "$RELEASE_TAG^{tag}" >/dev/null &&
              	[ "$(git rev-list --max-count=1 "$RELEASE_TAG")" != "$(git rev-parse HEAD)" ]; then
              	printf '%s\n' "$RELEASE_TAG already exists and does not point at HEAD" >&2
              	exit 1
              fi

  create_source_tag:
    name: Create Source Tag
    needs: validate_release
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create source tag
        env:
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          if ! git rev-parse --quiet --verify "$RELEASE_TAG^{tag}" >/dev/null; then
          	git tag --annotate "$RELEASE_TAG" --message "$RELEASE_TAG"
          fi

      - name: Push source tag
        run: git push origin "$RELEASE_TAG"

  publish_apt_repository:
    name: Publish APT Repository
    needs: create_source_tag
    permissions:
      contents: read
      id-token: write
      pages: write
    uses: lingyang-kong/apt-node-via-bun/.github/workflows/publish-apt-repository.yml@main
    with:
      release_version: ${{ inputs.release_version }}
    secrets:
      APT_GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}

  publish_homebrew_tap:
    name: Publish Homebrew Tap
    needs: create_source_tag
    permissions:
      contents: read
    uses: lingyang-kong/homebrew-node-via-bun/.github/workflows/publish-homebrew-tap.yml@main
    with:
      release_version: ${{ inputs.release_version }}
    secrets:
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
